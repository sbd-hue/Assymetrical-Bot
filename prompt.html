<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mpesa Prompt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Syne', sans-serif;
            background: radial-gradient(circle at top left, rgba(0,212,255,0.20), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(26,107,255,0.18), transparent 18%),
                        linear-gradient(180deg, #050d1a 0%, #081626 55%, #0f2240 100%);
            color: #eef6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.5;
            z-index: 0;
        }
        .page {
            width: 100%;
            max-width: 960px;
            position: relative;
            z-index: 1;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }
        .logo {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #1a6bff, #00d4ff);
            box-shadow: 0 0 24px rgba(0,212,255,0.24);
            font-weight: 800;
            color: white;
            font-size: 1.2rem;
        }
        .header-title {
            display: grid;
            gap: 6px;
        }
        .header-title h1 {
            margin: 0;
            font-family: 'DM Serif Display', serif;
            font-size: clamp(2.2rem, 3vw, 3rem);
            line-height: 1.05;
        }
        .header-title p {
            margin: 0;
            color: #9fb7d2;
            font-size: 1rem;
        }
        .grid {
            display: grid;
            gap: 24px;
            grid-template-columns: 1.1fr 0.9fr;
        }
        .card {
            background: rgba(11,24,41,0.92);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 28px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.28);
            overflow: hidden;
        }
        .card-inner {
            padding: 32px;
        }
        .section-title {
            margin: 0 0 18px;
            font-size: 1.2rem;
            letter-spacing: 0.02em;
            color: #e8f4ff;
        }
        .section-copy {
            color: #8fa8c4;
            line-height: 1.8;
            margin-bottom: 24px;
        }
        .field {
            display: grid;
            gap: 10px;
            margin-bottom: 18px;
        }
        .field label {
            color: #94aac7;
            font-size: 0.92rem;
        }
        .field input, .field textarea {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #eef6ff;
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus, .field textarea:focus {
            border-color: rgba(0,212,255,0.6);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
        }
        .fieldset {
            display: grid;
            gap: 16px;
        }
        .button-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 20px;
            border-radius: 16px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .btn-primary {
            color: white;
            background: linear-gradient(135deg, #1a6bff, #00d4ff);
            box-shadow: 0 18px 36px rgba(0,212,255,0.18);
        }
        .btn-secondary {
            color: #c8d6e8;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .btn:hover { transform: translateY(-1px); }
        .prompt-box {
            background: rgba(0,0,0,0.15);
            border-radius: 22px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .prompt-label {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #8fa8c4;
            margin-bottom: 18px;
            font-size: 0.92rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .prompt-text {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 18px;
            color: #eef6ff;
            padding: 20px;
            line-height: 1.75;
            font-size: 0.98rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .hint-list {
            list-style: none;
            padding: 0;
            margin: 24px 0 0;
            display: grid;
            gap: 12px;
        }
        .hint-list li {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            color: #b9c9dd;
            font-size: 0.95rem;
        }
        .hint-list li::before {
            content: '•';
            color: #00d4ff;
            line-height: 1.3;
        }
        .summary {
            display: grid;
            gap: 16px;
            margin-top: 16px;
        }
        .summary-card {
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .summary-card strong { color: #fff; }
        @media (max-width: 860px) {
            .grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 620px) {
            .header { flex-direction: column; align-items: flex-start; }
            .button-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    
</body>
</html>
