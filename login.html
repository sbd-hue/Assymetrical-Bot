<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlueWave Bot — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; min-height: 100%; }
        body {
            font-family: 'Syne', sans-serif;
            background: radial-gradient(circle at top left, rgba(0,212,255,0.20), transparent 22%),
                        radial-gradient(circle at bottom right, rgba(26,107,255,0.18), transparent 18%),
                        linear-gradient(180deg, #050d1a 0%, #081626 55%, #0f2240 100%);
            color: #f7faff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.5;
            z-index: 0;
        }
        .page-shell {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }
        .brand-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
        }
        .brand-logo {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #1a6bff, #00d4ff);
            box-shadow: 0 0 24px rgba(0,212,255,0.24);
            color: white;
            font-size: 1.2rem;
        }
        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .brand-name em { color: #00d4ff; font-style: normal; }
        .login-card {
            border-radius: 28px;
            background: rgba(11,24,41,0.9);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 34px 80px rgba(0,0,0,0.35);
            overflow: hidden;
            backdrop-filter: blur(16px);
        }
        .login-panel {
            padding: 42px 36px;
        }
        .panel-title {
            font-family: 'DM Serif Display', serif;
            font-size: 2.4rem;
            margin-bottom: 12px;
            line-height: 1.05;
        }
        .panel-copy {
            color: #9fb7d2;
            line-height: 1.75;
            margin-bottom: 32px;
            max-width: 420px;
        }
        .field-group {
            display: grid;
            gap: 18px;
            margin-bottom: 30px;
        }
        .field {
            display: grid;
            gap: 10px;
        }
        .field label {
            font-size: 0.9rem;
            color: #a8bdd6;
        }
        .field input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #f7faff;
            font-size: 0.96rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus {
            border-color: rgba(0,212,255,0.6);
            box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
        }
        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
        }
        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #9fb7d2;
        }
        .checkbox-wrap input { accent-color: #00d4ff; }
        .forgot-link {
            color: #7fcfff;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .forgot-link:hover { text-decoration: underline; }
        .submit-btn {
            width: 100%;
            padding: 18px 20px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #1a6bff 0%, #00d4ff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 16px 40px rgba(0,212,255,0.22); }
        .divider-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 16px 0 26px;
            color: #6f8caa;
            font-size: 0.9rem;
        }
        .divider-row::before,
        .divider-row::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .alternative-actions {
            display: grid;
            gap: 14px;
        }
        .alt-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: #eef6ff;
            text-decoration: none;
            font-size: 0.95rem;
            transition: background 0.2s, border-color 0.2s;
        }
        .alt-button:hover { background: rgba(255,255,255,0.08); border-color: rgba(0,212,255,0.25); }
        .footer-note {
            margin-top: 20px;
            font-size: 0.92rem;
            color: #7c9dbd;
            text-align: center;
        }
        .footer-note a {
            color: #9ad8ff;
            text-decoration: none;
        }
        .footer-note a:hover { text-decoration: underline; }
        @media (max-width: 540px) {
            .login-panel { padding: 32px 24px; }
            .brand-bar { flex-direction: column; align-items: flex-start; }
            .page-shell { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <div class="brand-bar">
            <div class="brand-logo">BW</div>
            <div class="brand-name">BlueWave<em>Bot</em></div>
        </div>
        <div class="login-card">
            <div class="login-panel">
                <div class="panel-title">Welcome Back</div>
                <p class="panel-copy">Sign in to access your BlueWave Bot dashboard, manage subscriptions, and monitor live trading performance.</p>
                <form>
                    <div class="field-group">
                        <div class="field">
                            <label for="email">Email address</label>
                            <input id="email" type="email" placeholder="you@example.com" required>
                        </div>
                        <div class="field">
                            <label for="password">Password</label>
                            <input id="password" type="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <div class="form-actions">
                        <label class="checkbox-wrap">
                            <input type="checkbox">
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="submit-btn">Log in</button>
                </form>
                <div class="divider-row">Or continue with</div>
                <div class="alternative-actions">
                    <a href="#" class="alt-button"><i class="fab fa-telegram"></i> Continue with Telegram</a>
                    <a href="#" class="alt-button"><i class="fab fa-whatsapp"></i> Continue with WhatsApp</a>
                </div>
                <p class="footer-note">Don't have an account? <a href="index.html">Return to homepage</a></p>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" integrity="sha512-Rr97+JCaS1CK6MCKwSs34C4CRL4K5vQ9F24DPeo8XE1I7CzgO+PbhSfwB6Z0GuZaE2NEWkGAQZ9pEMdVfV0W7Q==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
</html>
